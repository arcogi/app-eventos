worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Previne upload timeouts em transferências pesadas (ex: vídeos grandes para o Express)
    client_max_body_size 50M;

    # Backend Node e SPA compilada (Redirecionamento Porta HTTP Padrão)
    server {
        listen 80;
        server_name familia-rein.cloud www.familia-rein.cloud;

        # Descomentar SSL blocks após gerar certificados Let's Encrypt na Hostinger
        # listen 443 ssl;
        # ssl_certificate /etc/letsencrypt/live/familia-rein.cloud/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/familia-rein.cloud/privkey.pem;

        location / {
            proxy_pass http://app-node:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Evolution API Proxy (Usado para Webhooks e Configuração Remota)
    server {
        listen 80;
        server_name api.familia-rein.cloud;

        # listen 443 ssl;
        # ssl_certificate /etc/letsencrypt/live/familia-rein.cloud/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/familia-rein.cloud/privkey.pem;

        location / {
            proxy_pass http://evolution-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
